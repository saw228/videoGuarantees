<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Switcher</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    overflow: hidden;
    background: #0f0f13;
  }

  /* Панель */
  #topbar {
    position: fixed;
    top: 12px;
    display: flex;
    gap: 10px;
    padding: 8px;
    background: rgba(30, 30, 40, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 14px;
    z-index: 1000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  #topbar button {
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    color: #ddd;
    background: transparent;
    transition: 0.25s;
  }

  #topbar button:hover {
    background: rgba(255,255,255,0.08);
    color: white;
  }

  #topbar button.active {
    background: linear-gradient(135deg, #4f8cff, #6a5cff);
    color: white;
    box-shadow: 0 4px 15px rgba(100,120,255,0.4);
  }

  /* Контейнер */
  .container {
    width: 100%;
    height: 100%;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  iframe.active {
    display: block;
  }
</style>
</head>

<body>

<!-- Панель -->
<div id="topbar">
  <button class="active" data-site="site1">Сбербанк КАРТА (успешно)</button>
  <button data-site="site2">Т-банк СБП (отказ)</button>
</div>

<!-- Сайты -->
<div class="container">
  <iframe id="site1" class="active" src="site1/index.html"></iframe>
  <iframe id="site2" src="site2/index.html"></iframe>
</div>

<script>
  const buttons = document.querySelectorAll("#topbar button");
  const iframes = {
    site1: document.getElementById("site1"),
    site2: document.getElementById("site2")
  };

  function switchSite(site) {
    buttons.forEach(b => b.classList.remove("active"));
    Object.values(iframes).forEach(f => f.classList.remove("active"));

    document.querySelector(`[data-site="${site}"]`).classList.add("active");
    iframes[site].classList.add("active");
  }

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      switchSite(btn.dataset.site);
    });
  });
</script>

</body>
</html>
